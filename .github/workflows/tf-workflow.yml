name: Terraform CI Workflow

on:
  pull_request:
    paths:
      - "*.tf"
      - "examples/**"
      - "tests/**"
      - "README.md"
      - ".pre-commit-config.yaml"
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "EKS cluster name for E2E tests"
        required: true
        type: string

env:
  TF_VERSION: "1.13.2"
  GO_VERSION: "1.21"

jobs:
  # ─── Layer 0: pre-commit (fmt + validate + lint + docs) ────────────────────
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: Init tflint plugins
        run: tflint --init --config .tflint.hcl

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: pre-commit/action@v3.0.1

  # ─── Layer 1: terraform validate (no credentials) ────────────────────────
  validate:
    name: Validate Examples
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      matrix:
        example:
          - examples/simple/terraform
          - examples/multi_clusters/terraform/account
          - examples/multi_clusters/terraform/kompass
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init + validate
        working-directory: ${{ matrix.example }}
        run: |
          terraform init -backend=false
          terraform validate

  # ─── Layer 2: terraform test (mock providers, no credentials) ────────────
  tf-test:
    name: Terraform Test (mock providers)
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        example:
          - examples/simple/terraform
          - examples/multi_clusters/terraform/account
          - examples/multi_clusters/terraform/kompass
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform test
        working-directory: ${{ matrix.example }}
        run: |
          terraform init -backend=false
          terraform test

  # ─── Layer 3: Terratest E2E (needs real infra — manual trigger only) ─────
  e2e:
    name: Terratest E2E
    runs-on: ubuntu-latest
    needs: tf-test
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Run Terratest — Terraform examples
        working-directory: tests/terratest
        env:
          CLUSTER_NAME: ${{ inputs.cluster_name }}
          ZESTY_API_TOKEN: ${{ secrets.ZESTY_API_TOKEN }}
        run: |
          go mod download
          go test -v -run "TestSimpleExample|TestMultiCluster" -timeout 30m

      - name: Run Terratest — Terragrunt examples
        working-directory: tests/terratest
        env:
          CLUSTER_NAME: ${{ inputs.cluster_name }}
          ZESTY_API_TOKEN: ${{ secrets.ZESTY_API_TOKEN }}
        run: |
          go test -v -run "TestSimpleTerragrunt|TestMultiClusterTerragrunt" -timeout 30m
